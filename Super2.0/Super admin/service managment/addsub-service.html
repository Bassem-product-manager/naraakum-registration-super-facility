<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Naraakum | Add Sub Service</title>
    <meta name="description" content="Naraakum" />

    <link rel="apple-touch-icon" sizes="180x180" href="../assets/images/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/images/favicon-16x16.png" />
    <link rel="manifest" href="../assets/images/site.webmanifest" />

    <!-- Global Theme -->
    <link rel="stylesheet" href="../assets/css/MainStyle.css" />

    <style>
      :root{
        --nk-green:#0f8c8c;
        --nk-border:#e6eaef;
      }

      /* Facility/SuperAdmin line under logo */
      .facility-line{
        display:flex;
        align-items:center;
        justify-content:center;
        gap:10px;
        margin-top:6px;
      }
      .facility-name{
        font-size:14px;
        font-weight:900;
        letter-spacing:.3px;
        color:#0b6f6f;
        text-shadow:0 1px 0 rgba(255,255,255,.5);
        line-height:1;
        margin:0;
      }

      /* KSA Clock */
      .ksa-clock{
        display:inline-flex;
        align-items:center;
        gap:8px;
        height:34px;
        padding:0 10px;
        border:1px solid rgba(16,24,40,.10);
        background:#fff;
        border-radius:12px;
        font-weight:900;
        font-size:12px;
        color:#101828;
        white-space:nowrap;
      }
      .ksa-clock .tz{
        color:var(--nk-green);
        font-weight:900;
        font-size:11px;
        padding:2px 8px;
        border-radius:999px;
        border:1px solid rgba(15,140,140,.22);
        background:rgba(15,140,140,.06);
      }
      .ksa-clock .time{letter-spacing:.2px;}

      .switch-account-item{display:flex;align-items:center;gap:10px;}
      .switch-account-item i{color:var(--nk-green);}

      /* ========= Page UI (Main Service Only) ========= */
      .nk-card{
        background:#fff;
        border:1px solid var(--nk-border);
        border-radius:14px;
        padding:14px;
      }
      .nk-card-title{
        margin:0 0 6px;
        font-size:14px;
        font-weight:900;
        color:#101828;
      }
      .nk-help{
        margin:0 0 12px;
        color:#667085;
        font-weight:800;
        font-size:12px;
        line-height:1.4;
      }

      .nk-grid{
        display:grid;
        grid-template-columns: 1fr 1fr;
        gap:12px;
      }
      .nk-grid-1{ grid-template-columns: 1fr; }

      .nk-field label{
        display:block;
        font-weight:900;
        font-size:12px;
        color:#6b7280;
        margin-bottom:6px;
      }

      .nk-actions{
        display:flex;
        justify-content:flex-end;
        gap:10px;
        margin-top:12px;
        flex-wrap:wrap;
      }

      .nk-divider{
        height:1px;
        background:#eef1f4;
        margin:12px 0;
      }

      .nk-hidden-input{ display:none; }
      .nk-upload{
        border:1px dashed rgba(15,140,140,.28);
        border-radius:12px;
        background:#f8fcfc;
        padding:12px;
      }
      .nk-upload-row{
        display:flex;
        align-items:flex-start;
        gap:12px;
        flex-wrap:wrap;
      }
      .nk-upload-preview{
        width:120px;
        height:120px;
        border:1px solid var(--nk-border);
        border-radius:12px;
        background:#fff;
        display:flex;
        align-items:center;
        justify-content:center;
        overflow:hidden;
      }
      .nk-upload-preview img{
        width:100%;
        height:100%;
        object-fit:cover;
        display:none;
      }
      .nk-upload-placeholder{
        font-size:11px;
        font-weight:800;
        color:#667085;
        text-align:center;
        padding:10px;
      }
      .nk-upload-content{ flex:1; min-width:220px; }
      .nk-upload-actions{
        display:flex;
        gap:8px;
        flex-wrap:wrap;
      }
      .nk-upload-meta{
        margin:8px 0 0;
        font-size:12px;
        font-weight:700;
        color:#667085;
      }

      @media (max-width: 992px){
        .nk-grid{ grid-template-columns: 1fr; }
      }
    </style>
  </head>

  <body data-menu="menu-services">
    <div class="preloader"></div>

    <div id="full-container">
      <!-- ===================== ASIDE (SUPER ADMIN) ===================== -->
      <div id="sidebar-slot" data-base="../"></div>

      <!-- ===================== MAIN ===================== -->
      <main class="main-page">
        <header class="page-header">
          <div class="page-name">
            <button type="button" id="open-menu-btn" aria-label="Open menu">
              <i class="fi fi-rr-menu-burger"></i>
            </button>
            <h2>Add Sub Service</h2>
          </div>

          <div class="member-side d-flex align-items-center gap-2">
            <div class="Orders notifcation-box dropdown">
              <div class="notifcation-icon" data-bs-toggle="dropdown" aria-expanded="false" data-bs-auto-close="outside">
                Notifications <span class="fsize-12 surface-secondary-400" id="notifCount">0</span>
              </div>
              <ul class="dropdown-menu dropdown-menu-start">
                <div class="dropdown-divider"></div>
                <li><a href="../Setting/Notifications_Nav.html" class="dropdown-item text-center fsize-14 semiBold">View All Notifications</a></li>
              </ul>
            </div>

            <div class="ksa-clock" id="ksaClock" title="Saudi Arabia Time">
              <span class="time" id="ksaTime">--:-- --</span>
              <span class="tz">KSA</span>
            </div>

            <div class="language-box">
              <a class="active" href="#"><img src="../assets/images/en.png" alt="En" /><span>En</span></a>
              <a href="#"><img src="../assets/images/ar.jpg" alt="ar" /><span>AR</span></a>
            </div>

            <div class="user dropdown">
              <figure class="avatar dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false" data-bs-auto-close="outside">
                <img src="../assets/images/avatar.svg" alt="avatar" />
              </figure>
              <ul class="dropdown-menu">
                <li>
                  <div class="p-12 pb-0">
                    <b class="fsize-14 semiBold">Super Admin</b>
                    <p class="fsize-12 text-grey">Admin / System Dashboard</p>
                  </div>
                </li>
                <div class="dropdown-divider"></div>
                <li>
                  <a class="dropdown-item fsize-14 switch-account-item" href="../template.html">
                    <i class="fi fi-rr-refresh"></i><span>Switch Account</span>
                  </a>
                </li>
                <div class="dropdown-divider"></div>
                <li><a class="dropdown-item text-red fsize-14" href="../template.html">Logout</a></li>
              </ul>
            </div>
          </div>
        </header>

        <div class="page-root">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
              <li class="breadcrumb-item active" aria-current="page"><a href="../template.html">Home</a></li>
              <li class="breadcrumb-item active" aria-current="page">Service Management</li>
              <li class="breadcrumb-item active" aria-current="page">Add Sub Service</li>
            </ol>
          </nav>
        </div>

        <div class="page-content">
          <!-- Main Service Form Only -->
          <div class="nk-card">
            <h3 class="nk-card-title">Create Sub Service</h3>
          

            <div class="nk-grid">
              <div class="nk-field">
                <label>Main Service*</label>
                <select id="mainService" class="form-control form-control-40">
                  <option value="">Select main service</option>
                  <option>Remote Consultation</option>
                  <option>Doctor Visit</option>
                  <option>Nursing Visit</option>
                  <option>Hemodialysis</option>
                  <option>Caregiver</option>
                  <option>Laboratory Analysis</option>
                  <option>Physiotherapy</option>
                </select>
              </div>

              <div class="nk-field">
                <label>Sub Service Name (English)*</label>
                <input id="subNameEn" type="text" class="form-control form-control-40" placeholder="e.g., ECG at Home" />
              </div>
            </div>

            <div class="nk-grid">
              <div class="nk-field">
                <label>Sub Service Name (Arabic)*</label>
                <input id="subNameAr" type="text" class="form-control form-control-40" placeholder="مثال: تخطيط القلب المنزلي" />
              </div>

              <div class="nk-field">
                <label>Sub Service Code</label>
                <input id="subCode" type="text" class="form-control form-control-40" placeholder="Auto or type (e.g., SRV-0012)" />
              </div>
            </div>

            <div class="nk-divider"></div>

            <div class="nk-grid">
              <div class="nk-field">
                <label>Service Mode*</label>
                <select id="serviceMode" class="form-control form-control-40">
                  <option value="">Select mode</option>
                  <option value="home">Home Visit</option>
                  <option value="facility">Facility Visit</option>
                  <option value="remote">Remote</option>
                </select>
              </div>

              <div class="nk-field">
                <label>Estimated Duration (minutes)*</label>
                <input id="durationMin" type="number" min="5" step="5" class="form-control form-control-40" placeholder="e.g., 45" />
              </div>
            </div>

            <div class="nk-grid">
              <div class="nk-field">
                <label>Base Price (SAR)*</label>
                <input id="basePrice" type="number" min="0" step="0.01" class="form-control form-control-40" placeholder="e.g., 120.00" />
              </div>

              <div class="nk-field">
                <label>Status*</label>
                <select id="subStatus" class="form-control form-control-40">
                  <option value="active" selected>Active</option>
                  <option value="inactive">Inactive</option>
                </select>
              </div>
            </div>

            <div class="nk-grid nk-grid-1">
              <div class="nk-field">
                <label>Description (Optional)</label>
                <textarea id="subDesc" class="form-control" style="min-height:120px;resize:vertical;" placeholder="Write a short description..."></textarea>
              </div>
            </div>

            <div class="nk-grid nk-grid-1">
              <div class="nk-field">
                <label>Service Image (Optional)</label>
                <div class="nk-upload">
                  <div class="nk-upload-row">
                    <div class="nk-upload-preview">
                      <img id="subImagePreview" alt="Sub service image preview" />
                      <span id="subImagePlaceholder" class="nk-upload-placeholder">No image selected</span>
                    </div>
                    <div class="nk-upload-content">
                      <div class="nk-upload-actions">
                        <input id="subImageInput" type="file" accept="image/*" class="nk-hidden-input" />
                        <button id="btnUploadSubImage" type="button" class="btn btn-primary-revers btn-32">Upload Image</button>
                        <button id="btnChangeSubImage" type="button" class="btn btn-primary-revers btn-32 d-none">Change</button>
                        <button id="btnRemoveSubImage" type="button" class="btn btn-secondary btn-32 d-none">Remove</button>
                      </div>
                      <p id="subImageMeta" class="nk-upload-meta">Accepted image files only. Max size: 2MB.</p>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="nk-divider"></div>

            <div class="nk-actions">
              <button id="btnReset" type="button" class="btn btn-primary-revers">Reset</button>
              <button id="btnSave" type="button" class="btn btn-primary">Save Sub Service</button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="../assets/js/jquery-3.4.1.min.js"></script>
    <script src="../assets/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/includes.js"></script>
<script src="../assets/js/adminSideMenu.js"></script>

    <script>
      // KSA Clock
      (function(){
        const el = document.getElementById("ksaTime");
        if(!el) return;

        function tick(){
          try{
            const fmt = new Intl.DateTimeFormat("en-US",{
              timeZone:"Asia/Riyadh",
              hour:"2-digit",
              minute:"2-digit",
              second:"2-digit",
              hour12:true
            });
            el.textContent = fmt.format(new Date());
          }catch(e){
            el.textContent = new Date().toLocaleTimeString("en-US", {hour12:true});
          }
        }
        tick();
        setInterval(tick, 1000);
      })();

      // Form logic
      (function(){
        const mainService = document.getElementById("mainService");
        const subNameEn = document.getElementById("subNameEn");
        const subNameAr = document.getElementById("subNameAr");
        const subCode = document.getElementById("subCode");
        const serviceMode = document.getElementById("serviceMode");
        const durationMin = document.getElementById("durationMin");
        const basePrice = document.getElementById("basePrice");
        const subStatus = document.getElementById("subStatus");
        const subDesc = document.getElementById("subDesc");
        const imageInput = document.getElementById("subImageInput");
        const imagePreview = document.getElementById("subImagePreview");
        const imagePlaceholder = document.getElementById("subImagePlaceholder");
        const imageMeta = document.getElementById("subImageMeta");
        const btnUploadImage = document.getElementById("btnUploadSubImage");
        const btnChangeImage = document.getElementById("btnChangeSubImage");
        const btnRemoveImage = document.getElementById("btnRemoveSubImage");
        const maxImageSize = 2 * 1024 * 1024;
        let imageObjectUrl = null;

        function humanFileSize(size){
          if(size < 1024) return size + " B";
          if(size < (1024 * 1024)) return (size / 1024).toFixed(1) + " KB";
          return (size / (1024 * 1024)).toFixed(2) + " MB";
        }

        function clearImageState(){
          if(imageObjectUrl){
            URL.revokeObjectURL(imageObjectUrl);
            imageObjectUrl = null;
          }
          imageInput.value = "";
          imagePreview.removeAttribute("src");
          imagePreview.style.display = "none";
          imagePlaceholder.style.display = "block";
          btnUploadImage.classList.remove("d-none");
          btnChangeImage.classList.add("d-none");
          btnRemoveImage.classList.add("d-none");
          imageMeta.textContent = "Accepted image files only. Max size: 2MB.";
        }

        function setImageState(file){
          if(imageObjectUrl){
            URL.revokeObjectURL(imageObjectUrl);
            imageObjectUrl = null;
          }
          imageObjectUrl = URL.createObjectURL(file);
          imagePreview.src = imageObjectUrl;
          imagePreview.style.display = "block";
          imagePlaceholder.style.display = "none";
          btnUploadImage.classList.add("d-none");
          btnChangeImage.classList.remove("d-none");
          btnRemoveImage.classList.remove("d-none");
          imageMeta.textContent = file.name + " (" + humanFileSize(file.size) + ")";
        }

        function openImagePicker(){
          imageInput.click();
        }

        function reset(){
          mainService.value = "";
          subNameEn.value = "";
          subNameAr.value = "";
          subCode.value = "";
          serviceMode.value = "";
          durationMin.value = "";
          basePrice.value = "";
          subStatus.value = "active";
          subDesc.value = "";
          clearImageState();
        }

        btnUploadImage.addEventListener("click", openImagePicker);
        btnChangeImage.addEventListener("click", openImagePicker);
        btnRemoveImage.addEventListener("click", clearImageState);

        imageInput.addEventListener("change", function(){
          const file = imageInput.files && imageInput.files[0];
          if(!file) return;
          if(!(file.type || "").toLowerCase().startsWith("image/")){
            alert("Please select a valid image file.");
            clearImageState();
            return;
          }
          if(file.size > maxImageSize){
            alert("Image size must be 2MB or less.");
            clearImageState();
            return;
          }
          setImageState(file);
        });

        window.addEventListener("beforeunload", function(){
          if(imageObjectUrl){
            URL.revokeObjectURL(imageObjectUrl);
            imageObjectUrl = null;
          }
        });

        document.getElementById("btnReset").addEventListener("click", reset);

        document.getElementById("btnSave").addEventListener("click", function(){
          const main = (mainService.value || "").trim();
          const en = (subNameEn.value || "").trim();
          const ar = (subNameAr.value || "").trim();
          const mode = (serviceMode.value || "").trim();
          const dur = Number(durationMin.value || 0);
          const price = Number(basePrice.value || 0);

          if(!main || !en || !ar || !mode || dur <= 0 || price < 0){
            alert("Please fill all required fields for Sub Service.");
            return;
          }

          alert("Sub Service saved (UI only).");
          reset();
        });
      })();
    </script>
  </body>
</html>
