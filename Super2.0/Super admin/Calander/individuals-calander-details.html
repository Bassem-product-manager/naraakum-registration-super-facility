<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Naraakum | Individuals Calendar Redirect</title>
    <meta http-equiv="refresh" content="0; url=../Calander/individuals-calander.html" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: #f3f7f8;
        color: #344054;
      }
      a {
        color: #0f8c8c;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div>
      Redirecting to Individuals Calendar...
      <a id="fallbackLink" href="../Calander/individuals-calander.html">Open now</a>
    </div>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const provider = (params.get("provider") || "").toUpperCase();
        const target = new URL("../Calander/individuals-calander.html", window.location.href);

        if (provider) {
          sessionStorage.setItem("lastIndividualCalendarCode", provider);
          target.searchParams.set("provider", provider);
          target.searchParams.set("edit", "1");
        }

        const href = target.toString();
        const fallback = document.getElementById("fallbackLink");
        if (fallback) fallback.href = href;
        window.location.replace(href);
      })();
    </script>
  </body>
</html>
