<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>منصة الخدمات الصحية | رعاية صحية منزلية | نرعاكم</title>
    <meta name="description" content="Naraakum" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/images/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/images/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/images/favicon-16x16.png"
    />
    <link rel="manifest" href="assets/images/site.webmanifest" />
    <!-- Styles -->
    <link rel="stylesheet" href="assets/css/MainStyle.css" />
  </head>
  <body>
    <div class="tracking-full-container">
      <div class="tracking-modal-header">
        <figure class="provider-avatar-info provider-track-view">
          <img src="assets/images/dr.png" alt="نرعاكم" />
          <figcaption>
            <h2>د / عبدالله محمد الدسوقي</h2>
            <p>مركز الدكتور بسام الحمصي</p>
            <div class="call-number">
              <p>0114090340</p>
              <a target="_blank" href="tel:0114090340">
                <i class="fi fi-sr-phone-call"> </i>
              </a>
            </div>
          </figcaption>
        </figure>
        <!-- / provider-avatar-info -->

        <div class="d-flex gap-4">
          <span class="track-statistics">
            <span dir="ltr" id="map-duration"> </span>
            <p>الوقت المتبقى</p>
          </span>
          <span class="track-statistics">
            <span dir="ltr" id="map-Distance"> </span>
            <p>المسافة</p>
          </span>
        </div>
      </div>
      <div id="Tracking-map-container"></div>
    </div>
    <!-- Google Maps Key API -->
    <script
      async
      defer
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDrIDwxB952Xv0ogIH6ytLJ_iKfxfadfEM&callback=initMap&libraries=places&language=en"
    ></script>
    <script src="assets/js/Components/trackingMapOptions.js"></script>
  </body>
</html>
